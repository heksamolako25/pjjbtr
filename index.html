<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BTR Connection</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
    font-family:'Segoe UI',sans-serif;
    background:linear-gradient(135deg,#5f2c82,#49a09d);
    color:white;
    overflow-x:hidden;
}

header{
    text-align:center;
    padding:40px 20px;
}

header h1{
    font-size:38px;
    letter-spacing:2px;
}

.timeline{
    position:relative;
    max-width:700px;
    margin:40px auto;
}

.timeline::after{
    content:'';
    position:absolute;
    width:4px;
    background:rgba(255,255,255,0.4);
    top:0;
    bottom:0;
    left:50%;
    margin-left:-2px;
}

.item{
    padding:20px 40px;
    position:relative;
    width:50%;
}

.left{left:0;}
.right{left:50%;}

.card{
    background:rgba(255,255,255,0.15);
    padding:20px;
    border-radius:20px;
    backdrop-filter:blur(10px);
    text-align:center;
    box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

.logo{
    width:110px;
    height:110px;
    border-radius:50%;
    border:4px solid white;
    cursor:pointer;
    transition:0.4s;
}

.logo:hover{
    transform:scale(1.15);
    box-shadow:0 0 25px white;
}

/* Modal Umum */
.modal{
    display:none;
    position:fixed;
    z-index:1000;
    padding-top:120px;
    left:0;
    top:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.6);
    backdrop-filter:blur(6px);
}

.modal-content{
    background:white;
    color:#333;
    margin:auto;
    padding:30px;
    width:90%;
    max-width:450px;
    border-radius:20px;
    text-align:center;
    animation:zoomIn 0.3s ease;
}

.close{
    float:right;
    font-size:22px;
    cursor:pointer;
}

/* Tombol dalam modal */
.modal-button{
    display:block;
    margin:15px 0;
    padding:12px;
    background:#5f2c82;
    color:white;
    border:none;
    border-radius:12px;
    cursor:pointer;
    font-size:16px;
    transition:0.3s;
}

.modal-button:hover{
    background:#49a09d;
}

iframe{
    width:100%;
    height:400px;
    border:none;
    margin-top:15px;
}

@keyframes zoomIn{
    from{transform:scale(0.7);opacity:0;}
    to{transform:scale(1);opacity:1;}
}

@media screen and (max-width:600px){
    .item{
        width:100%;
        left:0 !important;
        padding-left:70px;
    }
    .timeline::after{
        left:30px;
    }
}
</style>
</head>

<body>

<header>
<h1>BTR Connection</h1>
<p>Building Together in Christ</p>
</header>

<div class="timeline">

<div class="item left">
<div class="card">
<h3>KAKR</h3>
<img src="logokakr.png" class="logo"
onclick="openModal('KAKR - Yesus Dijual<br><br>Lukas 22:2-6<br>Mazmur 41:5-10')">
</div>
</div>

<div class="item right">
<div class="card">
<h3>PERMATA</h3>
<img src="logopermata.png" class="logo"
onclick="openModal('PERMATA - Aku Kap Tuhan<br><br>Keluaran 34:5-9')">
</div>
</div>

<div class="item left">
<div class="card">
<h3>MORIA</h3>
<img src="logomoria.png" class="logo"
onclick="openModal('MORIA - Pusuh Peratenku Ngajari Aku<br><br>Mazmur 16:7-11')">
</div>
</div>

<div class="item right">
<div class="card">
<h3>MAMRE</h3>
<img src="logomamre.png" class="logo"
onclick="openModal('MAMRE - Beritaken Berita Si Meriah<br><br>Markus 16:14-18')">
</div>
</div>

<div class="item left">
<div class="card">
<h3>LAINNYA</h3>
<img src="logogbkp.png" class="logo"
onclick="openOtherModal()">
</div>
</div>

</div>

<!-- Modal Detail Biasa -->
<div id="mainModal" class="modal">
<div class="modal-content">
<span class="close" onclick="closeModal('mainModal')">&times;</span>
<div id="modalText"></div>
</div>
</div>

<!-- Modal Lainnya -->
<div id="otherModal" class="modal">
<div class="modal-content">
<span class="close" onclick="closeModal('otherModal')">&times;</span>
<h3>Pilihan Lainnya</h3>

<button class="modal-button" onclick="viewPDF('jadwalpjjbtr.pdf')">
📄 Jadwal PJJ BTR
</button>

<button class="modal-button" onclick="viewPDF('momo1maret.pdf')">
📄 Warta Jemaat Mingguan
</button>

<div id="pdfContainer" style="margin-top:20px; max-height:80vh; overflow:auto;"></div>
    
</div>
</div>

<script>

function openModal(text){
document.getElementById("modalText").innerHTML=text;
document.getElementById("mainModal").style.display="block";
}

function openOtherModal(){
document.getElementById("otherModal").style.display="block";
}

function closeModal(id){
document.getElementById(id).style.display="none";
document.getElementById("pdfContainer").innerHTML="";
}

function viewPDF(file){
    document.getElementById("pdfContainer").innerHTML =
    '<iframe src="'+file+'" width="100%" height="80vh" style="border:none;"></iframe>';
}

window.onclick=function(event){
if(event.target.classList.contains('modal')){
event.target.style.display="none";
document.getElementById("pdfContainer").innerHTML="";
}
}
</script>

</body>
</html>
