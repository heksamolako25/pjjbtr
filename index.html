<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BTR Connection Premium</title>

<style>
:root {
    --primary: #5f2c82;
    --secondary: #49a09d;
    --glass: rgba(255, 255, 255, 0.12);
    --border: rgba(255, 255, 255, 0.2);
    --shadow: 0 15px 35px rgba(0,0,0,0.2);
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
    font-family:'Poppins', 'Segoe UI', sans-serif;
    background: radial-gradient(circle at top left, #5f2c82, #2d133a);
    background-attachment: fixed;
    color:white;
    overflow-x:hidden;
}

/* --- FIX WELCOME OVERLAY --- */
#welcomeOverlay {
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    background: #000;
    display: flex; justify-content: center; align-items: center;
    z-index: 9999; /* Pastikan paling atas */
    transition: 0.8s cubic-bezier(0.85, 0, 0.15, 1);
}

.welcome-content { text-align: center; z-index: 10000; }

.animate-text-bold {
    font-size: 2.5rem;
    font-weight: 800;
    color: white;
    margin-bottom: 20px;
    letter-spacing: 3px;
}

.welcome-btn {
    padding: 15px 40px;
    background: white;
    color: black;
    border: none;
    border-radius: 50px;
    font-size: 1rem;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

.welcome-btn:hover { transform: scale(1.1); background: #eee; }

/* --- MAIN UI --- */
header{ text-align:center; padding:60px 20px; }
header h1{ font-size:32px; letter-spacing:3px; text-transform: uppercase; }

.timeline{ position:relative; max-width:800px; margin:20px auto; padding-bottom: 50px; }
.timeline::after{
    content:''; position:absolute; width:2px; background: rgba(255,255,255,0.2);
    top:0; bottom:0; left:50%; margin-left:-1px;
}

.item{ padding:20px 40px; position:relative; width:50%; }
.left{left:0;} .right{left:50%;}

.card{
    background: var(--glass);
    padding:20px; border-radius:25px;
    backdrop-filter: blur(15px);
    border: 1px solid var(--border);
    text-align:center;
    box-shadow: var(--shadow);
}

.logo{
    width:100px; height:100px; border-radius:50%; border:2px solid white;
    margin-bottom: 10px; cursor:pointer;
}

/* --- MODAL --- */
.modal{
    display:none; position:fixed; z-index:2000; left:0; top:0;
    width:100%; height:100%; background:rgba(0,0,0,0.8);
    backdrop-filter:blur(10px);
}

.modal-content{
    background: #fff; color:#111; margin: 5vh auto; padding:30px 15px;
    width:90%; max-width:600px; border-radius:30px; text-align:center;
    position: relative;
}

.close{ position: absolute; right: 20px; top: 15px; font-size:30px; cursor:pointer; color: #999; }

.modal-button{
    display:inline-block; margin:5px; padding:10px 20px; 
    background:var(--primary); color:white; border:none; border-radius:50px;
    cursor:pointer; font-size:13px; font-weight: 600;
}

#pdfContainer, #aboutPdfContainer {
    margin-top: 20px; width: 100%; height: 60vh; border-radius: 15px;
    background: #f0f0f0; overflow: auto; -webkit-overflow-scrolling: touch;
}

@media screen and (max-width:600px){
    .item{ width:100%; left:0 !important; padding-left:50px; }
    .timeline::after{ left:20px; }
}
</style>
</head>

<body>

<div id="welcomeOverlay">
    <div class="welcome-content">
        <h1 class="animate-text-bold">BTr CONNECTION</h1>
        <button class="welcome-btn" onclick="closeWelcome()">ENTER EXPERIENCE</button>
    </div>
</div>

<header>
    <h1>BTr Connection</h1>
    <p style="opacity: 0.8;">BUILDING TOGETHER IN CHRIST</p>
</header>

<div class="timeline">
    <div class="item left"><div class="card"><h3>ABOUT PJJ BTr</h3><img src="logogbkp.png" class="logo" onclick="openAboutModal()"></div></div>
    <div class="item right"><div class="card"><h3>MAMRE</h3><img src="logomamre.png" class="logo" onclick="openModal('MAMRE - Beritaken Berita Si Meriah<br><br>Markus 16:14-18')"></div></div>
    <div class="item left"><div class="card"><h3>MORIA</h3><img src="logomoria.png" class="logo" onclick="openModal('MORIA - Pusuh Peratenku Ngajari Aku<br><br>Mazmur 16:7-11')"></div></div>
    <div class="item right"><div class="card"><h3>PERMATA</h3><img src="logopermata.png" class="logo" onclick="openModal('PERMATA - Aku Kap Tuhan<br><br>Keluaran 34:5-9')"></div></div>
    <div class="item left"><div class="card"><h3>KAKR</h3><img src="logokakr.png" class="logo" onclick="openModal('KAKR - Yesus Dijual<br><br>Lukas 22:2-6<br>Mazmur 41:5-10')"></div></div>
    <div class="item right"><div class="card"><h3>LAINNYA</h3><img src="logogbkp.png" class="logo" onclick="openOtherModal()"></div></div>
</div>

<div id="mainModal" class="modal">
    <div class="modal-content">
        <span class="close" onclick="closeModal('mainModal')">&times;</span>
        <div id="modalText"></div>
    </div>
</div>

<div id="aboutModal" class="modal">
    <div class="modal-content">
        <span class="close" onclick="closeModal('aboutModal')">&times;</span>
        <h2 style="margin-bottom:15px;">About PJJ BTr</h2>
        <button class="modal-button" onclick="viewPDF('jadwalpjjbtr.pdf', 'aboutPdfContainer')">Jadwal PJJ</button>
        <button class="modal-button" onclick="viewPDF('nominatifpjjbtr2026.pdf', 'aboutPdfContainer')">Nominatif PJJ</button>
        <div id="aboutPdfContainer"></div>
    </div>
</div>

<div id="otherModal" class="modal">
    <div class="modal-content">
        <span class="close" onclick="closeModal('otherModal')">&times;</span>
        <h2 style="margin-bottom:15px;">Informasi Jemaat</h2>
        <button class="modal-button" onclick="viewPDF('momo1maret.pdf', 'pdfContainer')">Warta Jemaat</button>
        <button class="modal-button" onclick="viewPDF('almanak2026.pdf', 'pdfContainer')">Almanak 2026</button>
        <div id="pdfContainer"></div>
    </div>
</div>

<script>
function closeWelcome() {
    const overlay = document.getElementById("welcomeOverlay");
    overlay.style.opacity = "0";
    overlay.style.pointerEvents = "none";
    setTimeout(() => { 
        overlay.style.display = "none"; 
    }, 800);
}

function openModal(text){
    document.getElementById("modalText").innerHTML = text;
    document.getElementById("mainModal").style.display = "block";
}

function openAboutModal(){ document.getElementById("aboutModal").style.display = "block"; }
function openOtherModal(){ document.getElementById("otherModal").style.display = "block"; }

function closeModal(id){
    document.getElementById(id).style.display = "none";
    const containers = ['pdfContainer', 'aboutPdfContainer'];
    containers.forEach(c => {
        const el = document.getElementById(c);
        if(el) el.innerHTML = '';
    });
}

function viewPDF(file, containerId){
    const container = document.getElementById(containerId);
    container.innerHTML = '<div style="padding:50px; color:#666;">Memuat PDF...</div>';
    
    setTimeout(() => {
        const baseUrl = window.location.href.substring(0, window.location.href.lastIndexOf('/') + 1);
        const fileUrl = baseUrl + file + "?v=" + new Date().getTime(); // Anti-cache
        
        container.innerHTML = `
            <object data="${fileUrl}" type="application/pdf" style="width:100%; height:100%;">
                <iframe src="${fileUrl}#toolbar=0" style="width:100%; height:100%; border:none;"></iframe>
            </object>
        `;
    }, 300);
}

window.onclick = function(event){ 
    if(event.target.classList.contains('modal')) closeModal(event.target.id); 
}
</script>

</body>
</html>
