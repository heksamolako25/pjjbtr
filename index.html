<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BTR Connection</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
    font-family:'Segoe UI',sans-serif;
    background:linear-gradient(135deg,#5f2c82,#49a09d);
    color:white;
    overflow-x:hidden;
}

/* --- ANIMASI WELCOME OVERLAY --- */
.welcome-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: linear-gradient(135deg, #5f2c82, #49a09d);
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 2000;
    transition: transform 0.8s cubic-bezier(0.77, 0, 0.175, 1);
}

.welcome-content {
    text-align: center;
    color: white;
    padding: 20px;
}

.animate-text {
    font-size: 20px;
    opacity: 0;
    transform: translateY(20px);
    animation: fadeInUp 0.8s forwards 0.3s;
}

.animate-text-bold {
    font-size: 36px;
    font-weight: bold;
    margin: 10px 0;
    opacity: 0;
    transform: translateY(20px);
    animation: fadeInUp 0.8s forwards 0.6s;
    text-shadow: 0 5px 15px rgba(0,0,0,0.3);
}

.welcome-line {
    width: 0;
    height: 3px;
    background: white;
    margin: 20px auto;
    animation: expandLine 1s forwards 1s;
}

.welcome-btn {
    margin-top: 30px;
    padding: 12px 35px;
    background: white;
    color: #5f2c82;
    border: none;
    border-radius: 30px;
    font-weight: bold;
    cursor: pointer;
    opacity: 0;
    animation: fadeIn 1s forwards 1.8s;
    transition: 0.3s;
    font-size: 16px;
}

.welcome-btn:hover {
    transform: scale(1.1);
    box-shadow: 0 0 20px rgba(255,255,255,0.4);
}

.hide-welcome { transform: translateY(-100%); }

@keyframes fadeInUp { to { opacity: 1; transform: translateY(0); } }
@keyframes fadeIn { to { opacity: 1; } }
@keyframes expandLine { to { width: 100px; } }

/* --- MAIN UI --- */
header{ text-align:center; padding:40px 20px; }
header h1{ font-size:38px; letter-spacing:2px; }

.timeline{ position:relative; max-width:700px; margin:40px auto; }
.timeline::after{
    content:''; position:absolute; width:4px; background:rgba(255,255,255,0.4);
    top:0; bottom:0; left:50%; margin-left:-2px;
}

.item{ padding:20px 40px; position:relative; width:50%; }
.left{left:0;} .right{left:50%;}

.card{
    background:rgba(255,255,255,0.15); padding:20px; border-radius:20px;
    backdrop-filter:blur(10px); text-align:center; box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

.logo{
    width:110px; height:110px; border-radius:50%; border:4px solid white;
    cursor:pointer; transition:0.4s;
}
.logo:hover{ transform:scale(1.15); box-shadow:0 0 25px white; }

/* Modal */
.modal{
    display:none; position:fixed; z-index:1000; left:0; top:0;
    width:100%; height:100%; background:rgba(0,0,0,0.6);
    backdrop-filter:blur(6px); overflow-y: auto;
}

.modal-content{
    background:white; color:#333; margin: 40px auto; padding:20px;
    width:92%; max-width:600px; border-radius:20px; text-align:center;
    animation:zoomIn 0.3s ease; position: relative;
}

.close{ position: absolute; right: 20px; top: 15px; font-size:28px; cursor:pointer; color: #666; }

.modal-button{
    display:inline-block; margin:5px; padding:10px 15px; background:#5f2c82;
    color:white; border:none; border-radius:12px; cursor:pointer; font-size:13px; transition:0.3s;
}
.modal-button:hover{ background:#49a09d; }

#pdfContainer {
    margin-top: 15px; width: 100%; height: 65vh; border: 1px solid #ccc;
    border-radius: 10px; background: #fff; overflow: auto; -webkit-overflow-scrolling: touch;
}
#pdfContainer object, #pdfContainer iframe { width: 100%; height: 100%; border: none; }

@keyframes zoomIn{ from{transform:scale(0.8);opacity:0;} to{transform:scale(1);opacity:1;} }

@media screen and (max-width:600px){
    .item{ width:100%; left:0 !important; padding-left:70px; }
    .timeline::after{ left:30px; }
    header h1 { font-size: 28px; }
    .animate-text-bold { font-size: 28px; }
}
</style>
</head>

<body>

<div id="welcomeOverlay" class="welcome-overlay">
    <div class="welcome-content">
        <p class="animate-text">Selamat Datang di</p>
        <h1 class="animate-text-bold">PJJ BTr Connection</h1>
        <div class="welcome-line"></div>
        <p class="animate-text" style="font-style: italic; font-size: 16px;">Building Together in Christ</p>
        <button class="welcome-btn" onclick="closeWelcome()">Mulai Jelajahi</button>
    </div>
</div>

<header>
    <h1>BTR Connection</h1>
    <p>Building Together in Christ</p>
</header>

<div class="timeline">
    <div class="item left"><div class="card"><h3>KAKR</h3><img src="logokakr.png" class="logo" onclick="openModal('KAKR - Yesus Dijual<br><br>Lukas 22:2-6<br>Mazmur 41:5-10')"></div></div>
    <div class="item right"><div class="card"><h3>PERMATA</h3><img src="logopermata.png" class="logo" onclick="openModal('PERMATA - Aku Kap Tuhan<br><br>Keluaran 34:5-9')"></div></div>
    <div class="item left"><div class="card"><h3>MORIA</h3><img src="logomoria.png" class="logo" onclick="openModal('MORIA - Pusuh Peratenku Ngajari Aku<br><br>Mazmur 16:7-11')"></div></div>
    <div class="item right"><div class="card"><h3>MAMRE</h3><img src="logomamre.png" class="logo" onclick="openModal('MAMRE - Beritaken Berita Si Meriah<br><br>Markus 16:14-18')"></div></div>
    <div class="item left"><div class="card"><h3>LAINNYA</h3><img src="logogbkp.png" class="logo" onclick="openOtherModal()"></div></div>
</div>

<div id="mainModal" class="modal">
    <div class="modal-content">
        <span class="close" onclick="closeModal('mainModal')">&times;</span>
        <div id="modalText"></div>
    </div>
</div>

<div id="otherModal" class="modal">
    <div class="modal-content">
        <span class="close" onclick="closeModal('otherModal')">&times;</span>
        <h3 style="margin-bottom:15px;">Pilihan Lainnya</h3>

        <button class="modal-button" onclick="viewPDF('jadwalpjjbtr.pdf')">📄 Jadwal PJJ</button>
        <button class="modal-button" onclick="viewPDF('momo1maret.pdf')">📄 Warta Jemaat</button>
        <button class="modal-button" onclick="viewPDF('nominatifpjjbtr2026.pdf')">📄 Nominatif PJJ</button>
        <button class="modal-button" onclick="viewPDF('almanak2026.pdf')">📄 Almanak</button>

        <div id="pdfContainer">
            <p style="padding: 50px 10px; color: #999;">Pilih dokumen di atas untuk pratinjau</p>
        </div>
    </div>
</div>

<script>
function closeWelcome() {
    document.getElementById("welcomeOverlay").classList.add("hide-welcome");
    setTimeout(() => { document.getElementById("welcomeOverlay").style.display = "none"; }, 800);
}

function openModal(text){
    document.getElementById("modalText").innerHTML=text;
    document.getElementById("mainModal").style.display="block";
}

function openOtherModal(){
    document.getElementById("otherModal").style.display="block";
}

function closeModal(id){
    document.getElementById(id).style.display="none";
    if(id === 'otherModal'){
        document.getElementById("pdfContainer").innerHTML='<p style="padding: 50px 10px; color: #999;">Pilih dokumen di atas untuk pratinjau</p>';
    }
}

function viewPDF(file){
    const container = document.getElementById("pdfContainer");
    container.innerHTML = '<p style="padding: 50px 10px; color: #999;">Memuat dokumen...</p>';
    
    setTimeout(() => {
        const baseUrl = window.location.href.substring(0, window.location.href.lastIndexOf('/') + 1);
        const fileUrl = baseUrl + file + "?v=" + new Date().getTime();
        
        container.innerHTML = `
            <object data="${fileUrl}" type="application/pdf" style="width:100%; height:100%;">
                <iframe src="${fileUrl}#toolbar=0&navpanes=0&scrollbar=1">
                    <p>Browser tidak mendukung pratinjau. <a href="${fileUrl}">Klik untuk unduh.</a></p>
                </iframe>
            </object>
        `;
    }, 300);
}

window.onclick=function(event){
    if(event.target.classList.contains('modal')){
        event.target.style.display="none";
        document.getElementById("pdfContainer").innerHTML='<p style="padding: 50px 10px; color: #999;">Pilih dokumen di atas untuk pratinjau</p>';
    }
}
</script>

</body>
</html>
