<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BTR Connection</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
    font-family:'Segoe UI',sans-serif;
    background:linear-gradient(135deg,#5f2c82,#49a09d);
    color:white;
    overflow-x:hidden;
}

header{
    text-align:center;
    padding:40px 20px;
}

header h1{
    font-size:38px;
    letter-spacing:2px;
}

.timeline{
    position:relative;
    max-width:700px;
    margin:40px auto;
}

.timeline::after{
    content:'';
    position:absolute;
    width:4px;
    background:rgba(255,255,255,0.4);
    top:0;
    bottom:0;
    left:50%;
    margin-left:-2px;
}

.item{
    padding:20px 40px;
    position:relative;
    width:50%;
}

.left{left:0;}
.right{left:50%;}

.card{
    background:rgba(255,255,255,0.15);
    padding:20px;
    border-radius:20px;
    backdrop-filter:blur(10px);
    text-align:center;
    box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

.logo{
    width:110px;
    height:110px;
    border-radius:50%;
    border:4px solid white;
    cursor:pointer;
    transition:0.4s;
}

.logo:hover{
    transform:scale(1.15);
    box-shadow:0 0 25px white;
}

/* Modal Umum */
.modal{
    display:none;
    position:fixed;
    z-index:1000;
    left:0;
    top:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.6);
    backdrop-filter:blur(6px);
    overflow-y: auto; /* Memungkinkan scroll pada modal itu sendiri di HP */
}

.modal-content{
    background:white;
    color:#333;
    margin: 50px auto;
    padding:20px;
    width:95%;
    max-width:500px;
    border-radius:20px;
    text-align:center;
    animation:zoomIn 0.3s ease;
    position: relative;
}

.close{
    position: absolute;
    right: 20px;
    top: 15px;
    font-size:28px;
    font-weight: bold;
    cursor:pointer;
    color: #666;
}

/* Tombol dalam modal */
.modal-button{
    display:inline-block;
    margin:5px;
    padding:10px 15px;
    background:#5f2c82;
    color:white;
    border:none;
    border-radius:12px;
    cursor:pointer;
    font-size:14px;
    transition:0.3s;
}

.modal-button:hover{
    background:#49a09d;
}

/* Container PDF Khusus Mobile Scroll */
#pdfContainer {
    margin-top: 15px;
    width: 100%;
    height: 65vh; /* Menggunakan 65% tinggi layar hp */
    overflow: auto;
    -webkit-overflow-scrolling: touch; /* Scroll halus di iOS */
    border: 1px solid #eee;
    border-radius: 10px;
    background: #f9f9f9;
}

#pdfContainer iframe {
    width: 100%;
    height: 100%;
    border: none;
    display: block;
}

@keyframes zoomIn{
    from{transform:scale(0.7);opacity:0;}
    to{transform:scale(1);opacity:1;}
}

@media screen and (max-width:600px){
    .item{
        width:100%;
        left:0 !important;
        padding-left:70px;
    }
    .timeline::after{
        left:30px;
    }
    header h1 { font-size: 28px; }
}
</style>
</head>

<body>

<header>
<h1>BTR Connection</h1>
<p>Building Together in Christ</p>
</header>

<div class="timeline">
    <div class="item left">
        <div class="card">
            <h3>KAKR</h3>
            <img src="logokakr.png" class="logo" onclick="openModal('KAKR - Yesus Dijual<br><br>Lukas 22:2-6<br>Mazmur 41:5-10')">
        </div>
    </div>

    <div class="item right">
        <div class="card">
            <h3>PERMATA</h3>
            <img src="logopermata.png" class="logo" onclick="openModal('PERMATA - Aku Kap Tuhan<br><br>Keluaran 34:5-9')">
        </div>
    </div>

    <div class="item left">
        <div class="card">
            <h3>MORIA</h3>
            <img src="logomoria.png" class="logo" onclick="openModal('MORIA - Pusuh Peratenku Ngajari Aku<br><br>Mazmur 16:7-11')">
        </div>
    </div>

    <div class="item right">
        <div class="card">
            <h3>MAMRE</h3>
            <img src="logomamre.png" class="logo" onclick="openModal('MAMRE - Beritaken Berita Si Meriah<br><br>Markus 16:14-18')">
        </div>
    </div>

    <div class="item left">
        <div class="card">
            <h3>LAINNYA</h3>
            <img src="logogbkp.png" class="logo" onclick="openOtherModal()">
        </div>
    </div>
</div>

<div id="mainModal" class="modal">
    <div class="modal-content">
        <span class="close" onclick="closeModal('mainModal')">&times;</span>
        <div id="modalText"></div>
    </div>
</div>

<div id="otherModal" class="modal">
    <div class="modal-content" style="max-width: 600px;">
        <span class="close" onclick="closeModal('otherModal')">&times;</span>
        <h3 style="margin-bottom:15px;">Pilihan Lainnya</h3>

        <button class="modal-button" onclick="viewPDF('jadwalpjjbtr.pdf')">
            📄 Jadwal PJJ BTR
        </button>

        <button class="modal-button" onclick="viewPDF('momo1maret.pdf')">
            📄 Warta Jemaat
        </button>

        <div id="pdfContainer">
            <p style="padding: 50px 10px; color: #999;">Pilih dokumen di atas untuk melihat pratinjau</p>
        </div>
    </div>
</div>

<script>
function openModal(text){
    document.getElementById("modalText").innerHTML=text;
    document.getElementById("mainModal").style.display="block";
}

function openOtherModal(){
    document.getElementById("otherModal").style.display="block";
}

function closeModal(id){
    document.getElementById(id).style.display="none";
    if(id === 'otherModal'){
        document.getElementById("pdfContainer").innerHTML='<p style="padding: 50px 10px; color: #999;">Pilih dokumen di atas untuk melihat pratinjau</p>';
    }
}

function viewPDF(file){
    const container = document.getElementById("pdfContainer");
    
    // Memberikan feedback visual saat loading
    container.innerHTML = '<p style="padding: 50px 10px; color: #999;">Memuat dokumen...</p>';
    
    // Gunakan setTimeout agar transisi mulus
    setTimeout(() => {
        // Kita menggunakan URL absolut agar lebih stabil di berbagai browser mobile
        const fullUrl = window.location.href.substring(0, window.location.href.lastIndexOf('/') + 1) + file;
        
        // Membuat iframe dengan atribut agar tidak langsung download di mobile
        container.innerHTML = `<iframe src="${fullUrl}#toolbar=0&navpanes=0&scrollbar=1" type="application/pdf"></iframe>`;
    }, 300);
}

// Menutup modal jika klik di luar kotak putih
window.onclick=function(event){
    if(event.target.classList.contains('modal')){
        event.target.style.display="none";
        document.getElementById("pdfContainer").innerHTML='<p style="padding: 50px 10px; color: #999;">Pilih dokumen di atas untuk melihat pratinjau</p>';
    }
}
</script>

</body>
</html>
