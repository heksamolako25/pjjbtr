<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BTR Connection Premium</title>

<style>
:root {
    --primary: #5f2c82;
    --secondary: #49a09d;
    --gold: #D4AF37;
    --glass: rgba(255, 255, 255, 0.12);
    --border: rgba(255, 255, 255, 0.2);
    --shadow: 0 15px 35px rgba(0,0,0,0.3);
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
    font-family:'Poppins', 'Segoe UI', sans-serif;
    background: radial-gradient(circle at top left, #5f2c82, #2d133a);
    background-attachment: fixed;
    color:white;
    overflow-x:hidden;
}

/* --- WELCOME OVERLAY --- */
#welcomeOverlay {
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    background: radial-gradient(circle at center, #1a0b25, #000);
    display: flex; justify-content: center; align-items: center;
    z-index: 9999;
    transition: 1s cubic-bezier(0.85, 0, 0.15, 1);
}

.welcome-content { text-align: center; }

.animate-text-bold {
    font-size: 3rem;
    font-weight: 800;
    letter-spacing: 5px;
    text-transform: uppercase;
    opacity: 0;
    transform: translateY(20px);
    animation: fadeInUp 1s forwards 0.3s;
}

.welcome-btn {
    margin-top: 30px;
    padding: 15px 45px;
    background: transparent;
    color: white;
    border: 2px solid white;
    border-radius: 50px;
    font-size: 1rem;
    font-weight: bold;
    cursor: pointer;
    opacity: 0;
    animation: fadeInUp 1s forwards 0.8s;
    transition: 0.4s;
}

.welcome-btn:hover { background: white; color: black; box-shadow: 0 0 20px rgba(255,255,255,0.5); }

@keyframes fadeInUp { to { opacity: 1; transform: translateY(0); } }

/* --- MAIN UI --- */
header { text-align:center; padding:60px 20px; opacity: 0; transition: 1s; }
.timeline { position:relative; max-width:800px; margin:20px auto; padding-bottom: 50px; opacity: 0; transition: 1s; }

.show-content { opacity: 1 !important; }

.timeline::after{
    content:''; position:absolute; width:2px; background: rgba(255,255,255,0.2);
    top:0; bottom:0; left:50%; margin-left:-1px;
}

.item{ padding:20px 40px; position:relative; width:50%; transition: 0.5s; }
.left{left:0;} .right{left:50%;}

.card{
    background: var(--glass);
    padding:25px; border-radius:30px;
    backdrop-filter: blur(15px);
    border: 1px solid var(--border);
    text-align:center;
    box-shadow: var(--shadow);
    transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}

.card:hover { transform: translateY(-10px); background: rgba(255,255,255,0.18); }

.logo{
    width:100px; height:100px; border-radius:50%; border:2px solid white;
    margin-bottom: 15px; cursor:pointer; transition: 0.3s;
    object-fit: cover;
}

.logo:active { transform: scale(0.9); }

/* --- MODAL --- */
.modal{
    display:none; position:fixed; z-index:2000; left:0; top:0;
    width:100%; height:100%; background:rgba(0,0,0,0.85);
    backdrop-filter:blur(15px);
}

@keyframes modalFall {
    0% { transform: translateY(-50px); opacity: 0; }
    100% { transform: translateY(0); opacity: 1; }
}

.modal-content{
    background: #fff; color:#111; margin: 10vh auto; padding:35px 20px;
    width:90%; max-width:600px; border-radius:35px; text-align:center;
    position: relative; animation: modalFall 0.4s ease-out;
}

.close{ position: absolute; right: 25px; top: 20px; font-size:32px; cursor:pointer; color: #999; }

.modal-button{
    display:inline-block; margin:8px; padding:12px 25px; 
    background:var(--primary); color:white; border:none; border-radius:50px;
    cursor:pointer; font-size:14px; font-weight: 600; transition: 0.3s;
}
.modal-button:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(0,0,0,0.2); }

#pdfContainer, #aboutPdfContainer, #mainPdfContainer {
    margin-top: 20px; width: 100%; height: 55vh; border-radius: 20px;
    background: #f4f4f4; overflow: auto; display: none;
}

@media screen and (max-width:600px){
    .item{ width:100%; left:0 !important; padding-left:50px; }
    .timeline::after{ left:20px; }
    .animate-text-bold { font-size: 2rem; }
}
</style>
</head>

<body>

<div id="welcomeOverlay">
    <div class="welcome-content">
        <h1 class="animate-text-bold">BTr CONNECTION</h1>
        <button class="welcome-btn" onclick="closeWelcome()">ENTER EXPERIENCE</button>
    </div>
</div>

<header id="mainHeader">
    <h1>BTr Connection</h1>
    <p style="opacity: 0.7; letter-spacing: 2px;">BUILDING TOGETHER IN CHRIST</p>
</header>

<div class="timeline" id="mainTimeline">
    <div class="item left">
        <div class="card">
            <h3>ABOUT PJJ BTr</h3>
            <img src="pjjbtrlogo.jpeg" class="logo" onclick="openAboutModal()" alt="Logo PJJ BTr">
        </div>
    </div>

    <div class="item right">
        <div class="card">
            <h3>MAMRE</h3>
            <img src="logomamre.png" class="logo" onclick="openDynamicModal('MAMRE', 'bahanmamreminggu1maret.pdf')">
        </div>
    </div>

    <div class="item left">
        <div class="card">
            <h3>MORIA</h3>
            <img src="logomoria.png" class="logo" onclick="openDynamicModal('MORIA', 'renungan_moria.pdf')">
        </div>
    </div>

    <div class="item right"><div class="card"><h3>PERMATA</h3><img src="logopermata.png" class="logo" onclick="openModal('PERMATA - Aku Kap Tuhan<br><br>Keluaran 34:5-9')"></div></div>
    <div class="item left"><div class="card"><h3>KAKR</h3><img src="logokakr.png" class="logo" onclick="openModal('KAKR - Yesus Dijual<br><br>Lukas 22:2-6<br>Mazmur 41:5-10')"></div></div>
    <div class="item right"><div class="card"><h3>LAINNYA</h3><img src="logogbkp.png" class="logo" onclick="openOtherModal()"></div></div>
</div>

<div id="mainModal" class="modal">
    <div class="modal-content">
        <span class="close" onclick="closeModal('mainModal')">&times;</span>
        <div id="modalText" style="font-size: 1.1rem; line-height: 1.6; margin-bottom: 15px;"></div>
        <div id="extraButtons"></div>
        <div id="mainPdfContainer"></div>
    </div>
</div>

<div id="aboutModal" class="modal">
    <div class="modal-content">
        <span class="close" onclick="closeModal('aboutModal')">&times;</span>
        <h2 style="margin-bottom:20px;">About PJJ BTr</h2>
        <button class="modal-button" onclick="viewPDF('jadwalpjjbtr.pdf', 'aboutPdfContainer')">📑 Jadwal PJJ</button>
        <button class="modal-button" onclick="viewPDF('nominatifpjjbtr2026.pdf', 'aboutPdfContainer')">📑 Nominatif PJJ</button>
        <button class="modal-button" onclick="viewPDF('bahanpjjminggu1maret.pdf', 'aboutPdfContainer')">✨ Bahan Renungan Mingguan</button>
        <div id="aboutPdfContainer"></div>
    </div>
</div>

<div id="otherModal" class="modal">
    <div class="modal-content">
        <span class="close" onclick="closeModal('otherModal')">&times;</span>
        <h2 style="margin-bottom:20px;">Informasi Jemaat</h2>
        <button class="modal-button" onclick="viewPDF('momo1maret.pdf', 'pdfContainer')">📑 Warta Jemaat</button>
        <button class="modal-button" onclick="viewPDF('almanak2026.pdf', 'pdfContainer')">📑 Almanak 2026</button>
        <div id="pdfContainer"></div>
    </div>
</div>

<script>
function closeWelcome() {
    const overlay = document.getElementById("welcomeOverlay");
    overlay.style.opacity = "0";
    overlay.style.pointerEvents = "none";
    document.getElementById("mainHeader").classList.add("show-content");
    document.getElementById("mainTimeline").classList.add("show-content");
    setTimeout(() => { overlay.style.display = "none"; }, 1000);
}

// Fungsi Modal Dinamis untuk Mamre & Moria agar muncul tombol Renungan
function openDynamicModal(title, pdfFileName) {
    document.getElementById("modalText").innerHTML = `<h3>${title}</h3><br>Silahkan pilih menu di bawah:`;
    document.getElementById("extraButtons").innerHTML = `
        <button class="modal-button" onclick="viewPDF('${pdfFileName}', 'mainPdfContainer')">✨ Bahan Renungan Mingguan</button>
    `;
    document.getElementById("mainPdfContainer").style.display = "none";
    document.getElementById("mainModal").style.display = "block";
}

function openModal(text){
    document.getElementById("modalText").innerHTML = text;
    document.getElementById("extraButtons").innerHTML = "";
    document.getElementById("mainPdfContainer").style.display = "none";
    document.getElementById("mainModal").style.display = "block";
}
    
function openAboutModal(){ 
    document.getElementById("aboutPdfContainer").style.display = "none";
    document.getElementById("aboutModal").style.display = "block"; 
}

function openOtherModal(){ document.getElementById("otherModal").style.display = "block"; }
    
function closeModal(id){
    document.getElementById(id).style.display = "none";
    const containers = ['aboutPdfContainer', 'pdfContainer', 'mainPdfContainer'];
    containers.forEach(c => {
        const el = document.getElementById(c);
        if(el) { el.innerHTML = ''; el.style.display = 'none'; }
    });
}

function viewPDF(file, containerId){
    const container = document.getElementById(containerId);
    container.style.display = "block";
    container.innerHTML = '<div style="padding:30px; color:#666;">Memuat dokumen...</div>';
    
    setTimeout(() => {
        const baseUrl = window.location.href.substring(0, window.location.href.lastIndexOf('/') + 1);
        const fileUrl = baseUrl + file + "?v=" + new Date().getTime();
        container.innerHTML = `<object data="${fileUrl}" type="application/pdf" style="width:100%; height:100%;"><iframe src="${fileUrl}#toolbar=0" style="width:100%; height:100%; border:none;"></iframe></object>`;
    }, 400);
}

window.onclick = function(event){ if(event.target.classList.contains('modal')) closeModal(event.target.id); }
</script>

</body>
</html>
